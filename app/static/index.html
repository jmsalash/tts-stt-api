<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TTS / STT Console</title>
<style>
  :root { --bg:#0f1420; --panel:#19202e; --panel2:#222b3d; --fg:#e6ebf2; --muted:#8a97ad; --accent:#4f8cff; --accent2:#34c77b; --err:#ff6b6b; --border:#2c3650; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; }
  .status { font-size:13px; color:var(--muted); }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--muted); margin-right:6px; }
  .dot.ok { background:var(--accent2); } .dot.bad { background:var(--err); }
  main { max-width:880px; margin:0 auto; padding:24px; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; }
  .tab { padding:9px 18px; border-radius:8px; background:var(--panel); cursor:pointer; border:1px solid var(--border); font-size:14px; }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; display:none; }
  .panel.active { display:block; }
  label { display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
  textarea, select, input[type=text], input[type=password] { width:100%; padding:10px 12px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; color:var(--fg); font-size:14px; }
  textarea { min-height:110px; resize:vertical; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:150px; }
  button.go { margin-top:18px; padding:11px 22px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:15px; cursor:pointer; }
  button.go:disabled { opacity:.5; cursor:not-allowed; }
  button.sec { background:var(--panel2); color:var(--fg); border:1px solid var(--border); padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
  .msg { margin-top:14px; font-size:13px; min-height:18px; }
  .msg.err { color:var(--err); } .msg.ok { color:var(--accent2); }
  audio { width:100%; margin-top:16px; }
  input[type=range]{ width:100%; }
  .seg { font-size:13px; border-top:1px solid var(--border); padding:7px 0; color:var(--muted); }
  .seg b { color:var(--fg); }
  .result { margin-top:16px; background:var(--panel2); border-radius:8px; padding:14px; white-space:pre-wrap; font-size:15px; line-height:1.5; min-height:24px; }
  .hint { font-size:12px; color:var(--muted); margin-top:6px; }
  .pill { font-size:12px; background:var(--panel2); border:1px solid var(--border); padding:3px 8px; border-radius:20px; }
</style>
</head>
<body>
<header>
  <h1>TTS / STT Console</h1>
  <span class="status"><span id="dot" class="dot"></span><span id="provInfo">connecting…</span></span>
</header>
<main>
  <div class="tabs">
    <div class="tab active" data-tab="tts">Text → Speech</div>
    <div class="tab" data-tab="stt">Speech → Text</div>
    <div class="tab" data-tab="set">Settings</div>
  </div>

  <!-- TTS -->
  <section class="panel active" id="tts">
    <label>Text to speak</label>
    <textarea id="ttsText" placeholder="Type something to synthesize…">Hello! This is a test of the text to speech system.</textarea>
    <div class="row">
      <div>
        <label>Language</label>
        <select id="ttsLang"></select>
      </div>
      <div>
        <label>Voice <button class="sec" id="reloadVoices" style="float:right;margin-top:-4px">reload</button></label>
        <select id="ttsVoice"></select>
      </div>
    </div>
    <div class="row">
      <div>
        <label>Emotion / intonation</label>
        <select id="ttsEmotion"></select>
      </div>
      <div>
        <label>Format</label>
        <select id="ttsFormat"></select>
      </div>
      <div>
        <label>Speed: <span id="speedVal">1.0×</span></label>
        <input type="range" id="ttsSpeed" min="0.5" max="2" step="0.05" value="1" />
      </div>
    </div>
    <button class="go" id="ttsGo">Generate speech</button>
    <div class="msg" id="ttsMsg"></div>
    <audio id="ttsAudio" controls hidden></audio>
    <div id="ttsDownload"></div>
  </section>

  <!-- STT -->
  <section class="panel" id="stt">
    <label>Language</label>
    <select id="sttLang"></select>
    <div class="row" style="margin-top:14px">
      <div>
        <label>Upload an audio file</label>
        <input type="text" id="fileName" readonly placeholder="no file selected" />
        <input type="file" id="sttFile" accept="audio/*" hidden />
        <button class="sec" id="pickFile" style="margin-top:8px">Choose file…</button>
      </div>
      <div>
        <label>…or record from microphone</label>
        <button class="sec" id="recBtn" style="margin-top:8px">● Start recording</button>
        <div class="hint" id="recHint"></div>
      </div>
    </div>
    <button class="go" id="sttGo">Transcribe file/recording</button>
    <div class="msg" id="sttMsg"></div>
    <div class="result" id="sttResult"></div>
    <div id="sttSegs"></div>

    <hr style="border-color:var(--border);margin:24px 0" />
    <label>Live streaming (real-time, microphone)</label>
    <button class="go" id="liveBtn" style="background:var(--accent2)">● Start live transcription</button>
    <div class="hint" id="liveHint">Click start, then speak. Partial text is grey; each sentence finalizes (white) on a pause.</div>
    <div class="result" id="liveResult"><span id="liveFinal"></span><span id="livePartial" style="color:var(--muted)"></span></div>
  </section>

  <!-- Settings -->
  <section class="panel" id="set">
    <div class="row">
      <div>
        <label>TTS provider</label>
        <select id="setTts"></select>
      </div>
      <div>
        <label>STT provider</label>
        <select id="setStt"></select>
      </div>
    </div>
    <label>Whisper model (downloads on first use after selecting)</label>
    <select id="setWhisper"></select>
    <div class="hint">Larger models are more accurate but bigger and slower. <code>large-v3</code> adds ~3&nbsp;GB and is downloaded only when you apply it and run a transcription.</div>
    <button class="go" id="setApply">Apply settings</button>
    <div class="msg" id="setMsg"></div>
    <hr style="border-color:var(--border);margin:22px 0" />
    <label>API key (only if the server has API_KEYS set)</label>
    <input type="password" id="apiKey" placeholder="Bearer token — stored in this browser only" />
    <button class="sec" id="saveKey" style="margin-top:10px">Save key</button>
    <div class="msg" id="keyMsg"></div>
  </section>
</main>

<script>
const LANG_NAMES = { en:"English", it:"Italian", es:"Spanish", fr:"French", de:"German",
  pt:"Portuguese", pl:"Polish", tr:"Turkish", ru:"Russian", nl:"Dutch", cs:"Czech",
  ar:"Arabic", "zh-cn":"Chinese", hu:"Hungarian", ko:"Korean", ja:"Japanese", hi:"Hindi" };
const $ = id => document.getElementById(id);
let CONFIG = null;

function apiKey(){ return localStorage.getItem("apiKey") || ""; }
function headers(extra={}){ const h={...extra}; const k=apiKey(); if(k) h["Authorization"]="Bearer "+k; return h; }
function setMsg(el, text, kind=""){ el.className="msg "+kind; el.textContent=text; }
function opt(val, label){ const o=document.createElement("option"); o.value=val; o.textContent=label||val; return o; }

document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
  t.classList.add("active"); $(t.dataset.tab).classList.add("active");
});

async function loadConfig(){
  try {
    const r = await fetch("/v1/config", { headers: headers() });
    if(!r.ok) throw new Error("HTTP "+r.status);
    CONFIG = await r.json();
    $("dot").className="dot ok";
    $("provInfo").innerHTML = `TTS: <span class="pill">${CONFIG.tts_provider}</span> · STT: <span class="pill">${CONFIG.stt_provider}</span> · model: <span class="pill">${CONFIG.whisper_model}</span>`;
    populate();
  } catch(e){
    $("dot").className="dot bad";
    $("provInfo").textContent = "API unreachable ("+e.message+")";
  }
}

function populate(){
  // TTS languages
  $("ttsLang").innerHTML="";
  CONFIG.tts_languages.forEach(c => $("ttsLang").appendChild(opt(c, LANG_NAMES[c]||c)));
  $("ttsLang").value = CONFIG.tts_languages.includes("en") ? "en" : CONFIG.tts_languages[0];
  // emotions
  $("ttsEmotion").innerHTML="";
  CONFIG.emotions.forEach(e => $("ttsEmotion").appendChild(opt(e, e)));
  if(CONFIG.emotions.includes("neutral")) $("ttsEmotion").value="neutral";
  // formats
  $("ttsFormat").innerHTML="";
  CONFIG.formats.forEach(f => $("ttsFormat").appendChild(opt(f, f.toUpperCase())));
  // STT languages: Auto + names
  $("sttLang").innerHTML="";
  $("sttLang").appendChild(opt("", "Auto-detect"));
  Object.keys(LANG_NAMES).forEach(c => $("sttLang").appendChild(opt(c, LANG_NAMES[c])));
  // settings selects
  fill($("setTts"), CONFIG.tts_providers, CONFIG.tts_provider);
  fill($("setStt"), CONFIG.stt_providers, CONFIG.stt_provider);
  fill($("setWhisper"), CONFIG.whisper_models, CONFIG.whisper_model);
  $("apiKey").value = apiKey();
  loadVoices();
}
function fill(sel, items, current){ sel.innerHTML=""; items.forEach(i=>sel.appendChild(opt(i,i))); if(current) sel.value=current; }

async function loadVoices(){
  const sel = $("ttsVoice"); sel.innerHTML=""; sel.appendChild(opt("","loading…"));
  try {
    const r = await fetch("/v1/voices", { headers: headers() });
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||("HTTP "+r.status)); }
    const data = await r.json(); sel.innerHTML="";
    if(!data.voices.length){ sel.appendChild(opt("","(no voices — provider not installed?)")); return; }
    data.voices.forEach(v => sel.appendChild(opt(v.id, v.name + (v.builtin?"":" (cloned)"))));
  } catch(e){ sel.innerHTML=""; sel.appendChild(opt("","error: "+e.message)); }
}

$("ttsSpeed").oninput = e => $("speedVal").textContent = (+e.target.value).toFixed(2)+"×";
$("reloadVoices").onclick = loadVoices;

$("ttsGo").onclick = async () => {
  const btn=$("ttsGo"); btn.disabled=true; setMsg($("ttsMsg"),"Synthesizing… (first run loads the model, can take a while)");
  $("ttsAudio").hidden=true; $("ttsDownload").innerHTML="";
  try {
    const body = {
      text: $("ttsText").value,
      voice: $("ttsVoice").value || null,
      language: $("ttsLang").value,
      emotion: $("ttsEmotion").value,
      speed: parseFloat($("ttsSpeed").value),
      format: $("ttsFormat").value
    };
    const r = await fetch("/v1/tts", { method:"POST", headers: headers({"Content-Type":"application/json"}), body: JSON.stringify(body) });
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||("HTTP "+r.status)); }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a=$("ttsAudio"); a.src=url; a.hidden=false; a.play().catch(()=>{});
    const dl=document.createElement("a"); dl.href=url; dl.download="speech."+body.format; dl.textContent="⬇ download "+body.format.toUpperCase(); dl.className="hint";
    $("ttsDownload").appendChild(dl);
    setMsg($("ttsMsg"),"Done.","ok");
  } catch(e){ setMsg($("ttsMsg"),"Error: "+e.message,"err"); }
  finally { btn.disabled=false; }
};

// ---- STT ----
let mediaRecorder=null, chunks=[], recordedBlob=null;
$("pickFile").onclick = () => $("sttFile").click();
$("sttFile").onchange = e => { const f=e.target.files[0]; if(f){ $("fileName").value=f.name; recordedBlob=null; $("recHint").textContent=""; } };

$("recBtn").onclick = async () => {
  if(mediaRecorder && mediaRecorder.state==="recording"){ mediaRecorder.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream); chunks=[];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = () => {
      recordedBlob = new Blob(chunks, {type: mediaRecorder.mimeType || "audio/webm"});
      stream.getTracks().forEach(t=>t.stop());
      $("recBtn").textContent="● Start recording";
      $("recHint").textContent="Recorded "+(recordedBlob.size/1024|0)+" KB — ready to transcribe.";
      $("fileName").value=""; $("sttFile").value="";
    };
    mediaRecorder.start(); $("recBtn").textContent="■ Stop recording"; $("recHint").textContent="Recording…";
  } catch(e){ $("recHint").textContent="Mic error: "+e.message; }
};

$("sttGo").onclick = async () => {
  const file = $("sttFile").files[0];
  let blob=null, name="audio.wav";
  if(file){ blob=file; name=file.name; }
  else if(recordedBlob){ blob=recordedBlob; name="recording.webm"; }
  if(!blob){ setMsg($("sttMsg"),"Choose a file or record first.","err"); return; }
  const btn=$("sttGo"); btn.disabled=true; setMsg($("sttMsg"),"Transcribing… (first run / model change downloads the model)");
  $("sttResult").textContent=""; $("sttSegs").innerHTML="";
  try {
    const fd=new FormData(); fd.append("file", blob, name);
    if($("sttLang").value) fd.append("language", $("sttLang").value);
    const r = await fetch("/v1/stt", { method:"POST", headers: headers(), body: fd });
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||("HTTP "+r.status)); }
    const data = await r.json();
    $("sttResult").textContent = data.text || "(no speech detected)";
    setMsg($("sttMsg"),`Language: ${data.language} · ${data.duration}s`,"ok");
    data.segments.forEach(s => { const d=document.createElement("div"); d.className="seg"; d.innerHTML=`<b>[${s.start}s–${s.end}s]</b> ${s.text}`; $("sttSegs").appendChild(d); });
  } catch(e){ setMsg($("sttMsg"),"Error: "+e.message,"err"); }
  finally { btn.disabled=false; }
};

// ---- Live streaming STT ----
let liveWS=null, liveCtx=null, liveSource=null, liveProc=null, liveStream=null;
function downsample(input, inRate, outRate){
  if(outRate===inRate) return input;
  const ratio=inRate/outRate, outLen=Math.floor(input.length/ratio), out=new Float32Array(outLen);
  for(let i=0;i<outLen;i++){ const idx=i*ratio, lo=Math.floor(idx), hi=Math.min(lo+1,input.length-1); out[i]=input[lo]+(input[hi]-input[lo])*(idx-lo); }
  return out;
}
function floatToInt16(f){ const o=new Int16Array(f.length); for(let i=0;i<f.length;i++){ const s=Math.max(-1,Math.min(1,f[i])); o[i]=s<0?s*0x8000:s*0x7fff; } return o; }
function stopAudioNodes(){
  try{ liveProc && liveProc.disconnect(); }catch(e){}
  try{ liveSource && liveSource.disconnect(); }catch(e){}
  try{ liveCtx && liveCtx.close(); }catch(e){}
  try{ liveStream && liveStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  liveProc=liveSource=liveCtx=liveStream=null;
}
async function startLive(){
  const lang=$("sttLang").value, proto=location.protocol==="https:"?"wss":"ws";
  let q="?"; if(lang) q+="language="+encodeURIComponent(lang)+"&"; if(apiKey()) q+="token="+encodeURIComponent(apiKey());
  $("liveFinal").textContent=""; $("livePartial").textContent="";
  liveWS=new WebSocket(proto+"://"+location.host+"/v1/stt/stream"+q);
  liveWS.onmessage=e=>{ const m=JSON.parse(e.data);
    if(m.type==="partial") $("livePartial").textContent=" "+m.text;
    else if(m.type==="final"){ $("liveFinal").textContent+=($("liveFinal").textContent?" ":"")+m.text; $("livePartial").textContent=""; }
    else if(m.type==="done") $("liveHint").textContent="Stream ended.";
    else if(m.type==="error") $("liveHint").textContent="Error: "+m.detail;
  };
  liveWS.onclose=()=>{ stopAudioNodes(); $("liveBtn").textContent="● Start live transcription"; };
  await new Promise((res,rej)=>{ liveWS.onopen=res; liveWS.onerror=()=>rej(new Error("WebSocket failed")); });
  liveStream=await navigator.mediaDevices.getUserMedia({audio:true});
  liveCtx=new (window.AudioContext||window.webkitAudioContext)();
  liveSource=liveCtx.createMediaStreamSource(liveStream);
  liveProc=liveCtx.createScriptProcessor(4096,1,1);
  liveProc.onaudioprocess=ev=>{
    if(!liveWS || liveWS.readyState!==1) return;
    const ds=downsample(ev.inputBuffer.getChannelData(0), liveCtx.sampleRate, 16000);
    liveWS.send(floatToInt16(ds).buffer);
  };
  liveSource.connect(liveProc); liveProc.connect(liveCtx.destination);
  $("liveBtn").textContent="■ Stop live transcription"; $("liveHint").textContent="Listening… speak now.";
}
function stopLive(){ if(liveWS && liveWS.readyState===1){ try{ liveWS.send(JSON.stringify({type:"stop"})); }catch(e){} } stopAudioNodes(); }
$("liveBtn").onclick=()=>{ if(liveWS && liveWS.readyState===1){ stopLive(); } else { startLive().catch(e=>{ $("liveHint").textContent="Mic/WS error: "+e.message; stopAudioNodes(); }); } };

// ---- Settings ----
$("setApply").onclick = async () => {
  setMsg($("setMsg"),"Applying…");
  try {
    const body={ tts_provider:$("setTts").value, stt_provider:$("setStt").value, whisper_model:$("setWhisper").value };
    const r = await fetch("/v1/config", { method:"POST", headers: headers({"Content-Type":"application/json"}), body: JSON.stringify(body) });
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.detail||("HTTP "+r.status)); }
    CONFIG = await r.json();
    setMsg($("setMsg"),"Saved. Whisper model will download on next transcription if changed.","ok");
    $("provInfo").innerHTML = `TTS: <span class="pill">${CONFIG.tts_provider}</span> · STT: <span class="pill">${CONFIG.stt_provider}</span> · model: <span class="pill">${CONFIG.whisper_model}</span>`;
    loadVoices();
  } catch(e){ setMsg($("setMsg"),"Error: "+e.message,"err"); }
};
$("saveKey").onclick = () => { localStorage.setItem("apiKey", $("apiKey").value.trim()); setMsg($("keyMsg"),"Key saved in this browser.","ok"); loadConfig(); };

loadConfig();
</script>
</body>
</html>
